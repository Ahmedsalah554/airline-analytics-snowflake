airline_analytics:
  target: dev
  outputs:
    # Development environment - Snowflake
    dev:
      type: snowflake
      account: YOUR_ACC
      user: YOUR_USER
      password: YOUR_PASSWORD
      database: YOUR_DATABASE_NAME
      schema: YOUR_SCHEMA_NAME    
      warehouse: YOUR_WAREHOUSE_NAME
      threads: 4
      client_session_keep_alive: false
      connect_timeout: 10
      
      # Snowflake-specific session parameters
      session_parameters:
        WEEK_START: 1
        QUERY_TAG: "dbt_airline_analytics_dev"
        TIMEZONE: "UTC"
      
    # Production environment - Snowflake
    prod:
      type: snowflake
      account: YOUR_ACC
      user: YOUR_USER
      password: YOUR_PASSWORD
      database: YOUR_DATABASE_NAME
      schema: YOUR_SCHEMA_NAME    
      warehouse: YOUR_WAREHOUSE_NAME
      threads: 4
      client_session_keep_alive: true
      connect_timeout: 10
      
      session_parameters:
        WEEK_START: 1
        QUERY_TAG: "dbt_airline_analytics_prod"
        TIMEZONE: "UTC"
    
    # Raw data layer - Snowflake
    raw:
      type: snowflake
      account: YOUR_ACC
      user: YOUR_USER
      password: YOUR_PASSWORD
      database: YOUR_DATABASE_NAME
      schema: YOUR_SCHEMA_NAME    
      warehouse: YOUR_WAREHOUSE_NAME
      threads: 4
      client_session_keep_alive: false
      connect_timeout: 10
      
      session_parameters:
        WEEK_START: 1
        QUERY_TAG: "dbt_airline_raw_data"
        TIMEZONE: "UTC"
